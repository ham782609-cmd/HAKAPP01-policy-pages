<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HAK Assistant 고객지원</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1 class="title">고객지원</h1>
      <p class="meta">최종 업데이트: 2026-03-03</p>

      <section class="card">
        <h2>문의 채널</h2>
        <p>
          이메일: <a href="mailto:support@hakassistant.app">support@hakassistant.app</a>
        </p>
      </section>

      <section class="card">
        <h2>응답 정책</h2>
        <p>영업일 기준 2일 이내 1차 답변을 목표로 합니다.</p>
      </section>

      <section class="card">
        <h2>문의 시 포함하면 좋은 정보</h2>
        <ul>
          <li>앱 버전</li>
          <li>기기 모델 / OS 버전</li>
          <li>문제 발생 시각</li>
          <li>문제 화면 설명</li>
        </ul>
        <span class="pill">App Store 심사용 공개 문서</span>
      </section>
    </main>
  </body>
</html>
